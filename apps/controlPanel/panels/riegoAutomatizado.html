<!doctype html><html lang="es"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Dashboard</title><script src="https://cdn.jsdelivr.net/npm/chart.js"></script><style>body{font-family:Arial;background:#f4f4f4;margin:0}header{background:#2d6a4f;color:#fff;text-align:center;padding:10px}.card{display:flex;gap:20px;flex-wrap:wrap;background:#fff;margin:10px;padding:15px;border-radius:10px;box-shadow:0 2px 5px #0002}.dashboard-row{display:flex;flex-wrap:wrap}.dashboard-row>.card{flex:1;min-width:320px}.controls button{display:block;width:100%;margin:5px 0;padding:10px;background:#2a9d8f;color:#fff;border:0;border-radius:8px}.cycle-chart-container{width:180px;height:180px}.canvas-container{height:320px}.table-wrapper{max-height:420px;overflow:auto}table{width:100%;border-collapse:collapse}th,td{border:1px solid #ccc;padding:6px;text-align:center}th{background:#eee;position:sticky;top:0}</style></head><body><header><h1>🌱 Dashboard de Riego Inteligente</h1></header><section class="card"><div><h3>Ciclo de Luz</h3><b>Zona 01</b><div class="cycle-chart-container"><canvas id="ciclo"></canvas></div><p><span id="hl"></span>h luz / <span id="ht"></span>h</p></div><div><h3>Estado Actual</h3><ul><li>🌡️ <span id="temp"></span> °C</li><li>💧 <span id="hum"></span> %</li><li>🚿 <span id="cau"></span> L/min</li></ul></div><div class="controls"><h3>Control Manual</h3><button onclick="r(1)">Riego1</button><button onclick="r(2)">Riego2</button><button onclick="r(3)">Riego3</button><button onclick="r(4)">Riego4</button></div></section><div class="dashboard-row"><section class="card"><div style="width:100%"><h2>Gráfico</h2><div class="canvas-container"><canvas id="graf"></canvas></div></div></section><section class="card"><div class="table-wrapper" style="width:100%"><h2>Historial</h2><table><thead><tr><th>Fecha</th><th>Humedad</th><th>Temp</th><th>Caudal</th></tr></thead><tbody id="tbody"></tbody></table></div></section></div><script>
function r(i){alert("Activando riego "+i+" por 5 segundos");}
document.getElementById('hl').textContent=18;document.getElementById('ht').textContent=24;
document.getElementById('temp').textContent=26.4;document.getElementById('hum').textContent=47;document.getElementById('cau').textContent=3.2;
const tb=document.getElementById('tbody');let rows="";
for(let i=0;i<40;i++){rows+=`<tr><td>2026-07-${String((i%30)+1).padStart(2,"0")} 08:${String(i).padStart(2,"0")}</td><td>${42+i%10}</td><td>${24+i%5}</td><td>${(3+(i%4)/10).toFixed(1)}</td></tr>`;}
tb.innerHTML=rows;
new Chart(document.getElementById('ciclo'),{type:'doughnut',data:{labels:['Luz','Oscuridad'],datasets:[{data:[18,6],backgroundColor:['#f4d35e','#1d3557']}]},options:{cutout:'70%'}});
new Chart(document.getElementById('graf'),{type:'line',data:{labels:['Lun','Mar','Mié','Jue','Vie','Sáb','Dom'],datasets:[{label:'Humedad',data:[45,48,50,46,49,47,44]},{label:'Temperatura',data:[26,27,28,25,27,26,25]},{label:'Caudal',data:[3.2,3,3.4,3.1,3.3,3.2,3]}]},options:{responsive:true,maintainAspectRatio:false}});
</script></body></html>

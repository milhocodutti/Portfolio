<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Plataforma Multimedia</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{
background:#111827;
color:white;
}

nav{

height:70px;
background:#1c2333;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 30px;

}

.logo{

font-size:24px;
font-weight:bold;
color:#42a5f5;

}

.grid{

display:grid;
grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
gap:20px;
padding:40px;

}

.card{

background:#1c2333;
border-radius:10px;
overflow:hidden;
cursor:pointer;
transition:.3s;

}

.card:hover{

transform:scale(1.03);

}

.thumb{

height:150px;

}

.thumb img{

width:100%;
height:100%;
object-fit:cover;

}

.info{

padding:15px;

}

.info h3{

margin-bottom:8px;

}

.info p{

color:#bbb;
font-size:14px;

}

.modal{

display:none;
justify-content:center;
align-items:center;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.9);

}

.modal video{

width:90%;
max-width:1100px;

}

.cerrar{

position:absolute;
top:20px;
right:40px;
font-size:40px;
cursor:pointer;

}

@media(max-width:768px){

.grid{

grid-template-columns:1fr;

}

}

</style>

</head>

<body>

<nav>

<div class="logo">
🎬 Plataforma Multimedia
</div>

</nav>

<div id="contenedorVideos" class="grid"></div>

<div class="modal" id="modal">

<span class="cerrar" onclick="cerrarVideo()">&times;</span>

<video id="player" controls></video>

</div>

<script>

const videos=[

{
titulo:"Curso HTML",
descripcion:"Introducción a HTML",
miniatura:"imagenes/html.jpg",
archivo:"videos/html.mp4"
},

{
titulo:"Curso CSS",
descripcion:"Aprende CSS",
miniatura:"imagenes/css.jpg",
archivo:"videos/css.mp4"
},

{
titulo:"Curso JavaScript",
descripcion:"Nivel Inicial",
miniatura:"imagenes/javascript.jpg",
archivo:"videos/javascript.mp4"
},

{
titulo:"Curso PHP",
descripcion:"Backend",
miniatura:"imagenes/php.jpg",
archivo:"videos/php.mp4"
},

{
titulo:"Curso SQL",
descripcion:"Base de datos",
miniatura:"imagenes/sql.jpg",
archivo:"videos/sql.mp4"
},

{
titulo:"Curso Python",
descripcion:"Desde cero",
miniatura:"imagenes/python.jpg",
archivo:"videos/python.mp4"
}

];

const contenedor=document.getElementById("contenedorVideos");

videos.forEach(video=>{

contenedor.innerHTML+=`

<div class="card" onclick="abrirVideo('${video.archivo}')">

<div class="thumb">

<img src="${video.miniatura}" alt="${video.titulo}">

</div>

<div class="info">

<h3>${video.titulo}</h3>

<p>${video.descripcion}</p>

</div>

</div>

`;

});

const modal=document.getElementById("modal");
const player=document.getElementById("player");

function abrirVideo(video){

player.src=video;

modal.style.display="flex";

player.play();

}

function cerrarVideo(){

player.pause();
player.currentTime=0;

modal.style.display="none";

}

window.onclick=function(e){

if(e.target==modal){

cerrarVideo();

}

}

</script>

</body>

</html>
